<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Create account · SmartAttend</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --card: #1a1a25;
  --border: #2a2a3d;
  --primary: #7c5cbf;
  --primary-light: #9b6dff;
  --glow: #c084fc;
  --accent: #f0c040;
  --accent-pink: #ec4899;
  --text: #e8e8f0;
  --muted: #6b6b8a;
  --green: #3dd68c;
  --red: #f05070;
  --blue: #4a8fff;
  --cyan: #06b6d4;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow-x: hidden;
}

/* ============================================
   ENHANCED BACKGROUND WITH LARGER MOVING STARS
   ============================================ */
.star-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.star {
  position: absolute;
  background: radial-gradient(ellipse at center, rgba(255,255,255,1) 0%, rgba(255,255,255,0.5) 40%, transparent 80%);
  border-radius: 50%;
  animation: starFloat 8s infinite alternate ease-in-out;
}

.star-xl { width: 6px; height: 6px; }
.star-lg { width: 5px; height: 5px; }
.star-md { width: 4px; height: 4px; }
.star-sm { width: 3px; height: 3px; }

.star-gold {
  background: radial-gradient(ellipse at center, rgba(255,215,0,1) 0%, rgba(255,215,0,0.6) 40%, transparent 80%);
  animation: starFloatGold 6s infinite alternate;
}

.star-purple {
  background: radial-gradient(ellipse at center, rgba(155,109,255,1) 0%, rgba(155,109,255,0.5) 40%, transparent 80%);
  animation: starFloatPurple 7s infinite alternate;
}

.star-cyan {
  background: radial-gradient(ellipse at center, rgba(6,182,212,1) 0%, rgba(6,182,212,0.5) 40%, transparent 80%);
  animation: starFloatCyan 5s infinite alternate;
}

@keyframes starFloat {
  0% { opacity: 0.3; transform: translateY(0px) scale(1); }
  100% { opacity: 1; transform: translateY(-15px) scale(1.2); }
}

@keyframes starFloatGold {
  0% { opacity: 0.4; transform: translateX(0px) scale(1); }
  100% { opacity: 1; transform: translateX(10px) scale(1.3); }
}

@keyframes starFloatPurple {
  0% { opacity: 0.3; transform: translateY(0px) translateX(0px) scale(1); }
  100% { opacity: 1; transform: translateY(-20px) translateX(8px) scale(1.25); }
}

@keyframes starFloatCyan {
  0% { opacity: 0.4; transform: translateX(0px) scale(1); }
  100% { opacity: 1; transform: translateX(-12px) scale(1.3); }
}

.shooting-star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: linear-gradient(90deg, rgba(255,255,255,1), rgba(255,255,255,0));
  border-radius: 50%;
  animation: shootStar 3s linear infinite;
}

@keyframes shootStar {
  0% { transform: translateX(0) translateY(0); opacity: 1; }
  100% { transform: translateX(-200px) translateY(100px); opacity: 0; }
}

.cosmic-dust {
  position: absolute;
  width: 8px;
  height: 8px;
  background: radial-gradient(ellipse at center, rgba(155, 109, 255, 0.7) 0%, rgba(155, 109, 255, 0.2) 70%);
  border-radius: 50%;
  animation: floatDust 20s infinite linear;
}

@keyframes floatDust {
  0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-100px) translateX(60px) rotate(360deg); opacity: 0; }
}

.nebula {
  position: absolute;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle at center, rgba(124, 92, 191, 0.25) 0%, rgba(74, 143, 255, 0.12) 40%, transparent 70%);
  border-radius: 50%;
  filter: blur(80px);
  animation: nebulaDrift 25s infinite alternate;
}

.nebula-1 { top: -300px; left: -200px; }
.nebula-2 { bottom: -250px; right: -150px; background: radial-gradient(circle at center, rgba(240, 192, 64, 0.18) 0%, rgba(155, 109, 255, 0.1) 50%, transparent 80%); animation-delay: -8s; }
.nebula-3 { top: 20%; right: 10%; width: 450px; height: 450px; background: radial-gradient(circle at center, rgba(6, 182, 212, 0.15) 0%, rgba(236, 72, 153, 0.1) 50%, transparent 80%); animation-delay: -15s; }

@keyframes nebulaDrift {
  0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
  100% { transform: translate(50px, -30px) scale(1.15); opacity: 0.8; }
}

.grid-overlay {
  position: fixed;
  inset: 0;
  background-image: linear-gradient(rgba(42,42,61,0.2) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(42,42,61,0.2) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* ============================================
   AUTH CARD - GLASS MORPHISM WITH GRADIENT BORDER
   ============================================ */
.auth-card {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 480px;
  background: linear-gradient(135deg, rgba(26, 26, 37, 0.85), rgba(19, 19, 26, 0.9));
  backdrop-filter: blur(16px);
  border: 1px solid rgba(124, 92, 191, 0.4);
  border-radius: 32px;
  padding: 42px 38px;
  transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(124, 92, 191, 0.2) inset;
}

.auth-card:hover {
  transform: translateY(-8px) scale(1.01);
  border-color: rgba(155, 109, 255, 0.7);
  box-shadow: 0 40px 70px rgba(0, 0, 0, 0.6), 0 0 0 1.5px rgba(155, 109, 255, 0.35) inset;
}

/* Brand */
.brand {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
  justify-content: center;
}

.brand-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--primary), var(--glow), var(--accent-pink));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  transition: all 0.3s;
  box-shadow: 0 0 15px rgba(124, 92, 191, 0.4);
}

.brand:hover .brand-icon {
  transform: scale(1.08) rotate(8deg);
  box-shadow: 0 0 30px rgba(155, 109, 255, 0.8);
}

.brand-name {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.35rem;
  background: linear-gradient(135deg, #fff, var(--glow), var(--accent));
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  transition: all 0.3s;
}

.brand:hover .brand-name {
  background: linear-gradient(135deg, #fff, var(--accent), var(--glow));
  background-clip: text;
  -webkit-background-clip: text;
  letter-spacing: 0.5px;
}

.brand-name span {
  background: linear-gradient(135deg, var(--accent), var(--accent-pink));
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}

h2 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.8rem;
  margin-bottom: 8px;
  text-align: center;
  background: linear-gradient(135deg, #fff, var(--glow));
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
  transition: all 0.3s;
}

.auth-card:hover h2 {
  background: linear-gradient(135deg, #fff, var(--accent), var(--glow));
  background-clip: text;
  -webkit-background-clip: text;
}

.sub {
  color: var(--muted);
  font-size: 0.88rem;
  text-align: center;
  margin-bottom: 28px;
  font-weight: 400;
  transition: all 0.3s;
}

.auth-card:hover .sub {
  color: rgba(255, 255, 255, 0.6);
}

/* Labels */
label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  transition: all 0.3s;
}

label i {
  font-size: 0.7rem;
  color: var(--glow);
  transition: all 0.3s;
}

.input-group {
  margin-bottom: 5px;
}

.input-group:hover label {
  color: var(--glow);
  transform: translateX(3px);
}

.input-group:hover label i {
  transform: scale(1.1);
  color: var(--accent);
}

/* Input fields */
input {
  width: 100%;
  background: rgba(0, 0, 0, 0.4);
  border: 1.5px solid rgba(124, 92, 191, 0.4);
  border-radius: 20px;
  padding: 12px 18px;
  color: var(--text);
  font-size: 0.93rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  outline: none;
  transition: all 0.3s ease;
  margin-bottom: 16px;
}

input::placeholder {
  color: rgba(255, 255, 255, 0.25);
  font-weight: 400;
  transition: all 0.3s;
}

input:hover {
  border-color: var(--glow);
  background: rgba(20, 15, 45, 0.6);
  box-shadow: 0 0 0 3px rgba(124, 92, 191, 0.15);
  transform: translateX(2px);
}

input:focus {
  border-color: var(--primary-light);
  box-shadow: 0 0 0 5px rgba(124, 92, 191, 0.25);
  background: rgba(20, 15, 45, 0.8);
  transform: translateX(4px);
}

input:focus::placeholder {
  opacity: 0.5;
  transform: translateX(5px);
}

/* Password wrapper with toggle */
.password-wrapper {
  position: relative;
  width: 100%;
  margin-bottom: 16px;
}

.password-wrapper input {
  width: 100%;
  padding-right: 48px;
  margin-bottom: 0;
}

.toggle-password {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: transparent;
  border: none;
  color: rgba(255, 255, 255, 0.5);
  cursor: pointer;
  font-size: 1.1rem;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  z-index: 5;
}

.toggle-password:hover {
  color: var(--glow);
  text-shadow: 0 0 10px rgba(155, 109, 255, 0.6);
  transform: translateY(-50%) scale(1.15);
}

.toggle-password:active {
  transform: translateY(-50%) scale(0.95);
}

/* Hint text */
.hint {
  color: var(--muted);
  font-size: 0.7rem;
  margin-top: -10px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.3s;
}

.hint i {
  font-size: 0.65rem;
  color: var(--glow);
}

.input-group:hover ~ .hint,
.hint:hover {
  color: var(--text-soft);
}

/* Button */
.btn {
  width: 100%;
  padding: 14px 12px;
  border: none;
  border-radius: 40px;
  font-size: 0.95rem;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  background: linear-gradient(95deg, #7C3AED, #A855F7, #EC4899, #F59E0B);
  background-size: 240% 100%;
  color: white;
  margin-top: 12px;
  transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  position: relative;
  overflow: hidden;
  letter-spacing: 0.5px;
  box-shadow: 0 12px 30px -8px rgba(124, 58, 237, 0.4);
}

.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
  transform: skewX(-15deg);
  transition: left 0.6s ease;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.2), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

.btn:hover::before {
  left: 150%;
}

.btn:hover {
  background-position: 100% 0%;
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 22px 40px -12px rgba(124, 58, 237, 0.6);
}

.btn:hover::after {
  opacity: 1;
}

.btn:active {
  transform: translateY(1px) scale(0.98);
}

/* Alt link */
.alt {
  margin-top: 28px;
  text-align: center;
  color: var(--muted);
  font-size: 0.85rem;
  font-weight: 500;
  transition: all 0.3s;
}

.alt a {
  color: var(--glow);
  text-decoration: none;
  font-weight: 700;
  margin-left: 5px;
  position: relative;
  transition: all 0.3s;
  display: inline-block;
}

.alt a::before {
  content: '';
  position: absolute;
  bottom: -3px;
  left: 0;
  width: 0%;
  height: 2px;
  background: linear-gradient(90deg, var(--glow), var(--accent));
  transition: width 0.3s;
}

.alt a::after {
  content: '→';
  position: absolute;
  right: -20px;
  opacity: 0;
  transition: all 0.3s;
}

.alt a:hover {
  color: #fff;
  text-shadow: 0 0 12px var(--glow);
  transform: translateX(-3px);
}

.alt a:hover::before {
  width: 100%;
}

.alt a:hover::after {
  opacity: 1;
  right: -25px;
}

.alt:hover {
  transform: translateY(2px);
}

/* Error message */
.err {
  background: rgba(240, 80, 112, 0.12);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(240, 80, 112, 0.5);
  color: #ff8a9e;
  padding: 12px 18px;
  border-radius: 60px;
  font-size: 0.85rem;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  font-weight: 500;
  animation: shakeError 0.4s ease-in-out;
  transition: all 0.3s;
}

.err:hover {
  background: rgba(240, 80, 112, 0.2);
  border-color: rgba(240, 80, 112, 0.7);
  transform: scale(1.02);
}

@keyframes shakeError {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* Animation entrance */
@keyframes floatEntrance {
  0% {
    opacity: 0;
    transform: translateY(40px) scale(0.96);
    filter: blur(4px);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

.auth-card {
  animation: floatEntrance 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.2);
}

/* Ripple effect */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  transform: scale(0);
  animation: rippleAnim 0.6s linear;
  pointer-events: none;
}

@keyframes rippleAnim {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

/* Responsive */
@media (max-width: 520px) {
  .auth-card {
    padding: 32px 24px;
  }
  h2 {
    font-size: 1.6rem;
  }
  .brand-name {
    font-size: 1.15rem;
  }
  .brand-icon {
    width: 40px;
    height: 40px;
    font-size: 1.2rem;
  }
}
</style>
</head>
<body>

<!-- ENHANCED BACKGROUND WITH LARGER MOVING STARS -->
<div class="star-bg">
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>
</div>
<div class="grid-overlay"></div>

<script>
(function() {
  const starContainer = document.querySelector('.star-bg');
  if (!starContainer) return;
  
  const starCount = 180;
  for (let i = 0; i < starCount; i++) {
    const star = document.createElement('div');
    star.classList.add('star');
    
    const sizeRand = Math.random();
    if (sizeRand < 0.2) star.classList.add('star-xl');
    else if (sizeRand < 0.5) star.classList.add('star-lg');
    else if (sizeRand < 0.75) star.classList.add('star-md');
    else star.classList.add('star-sm');
    
    const colorRand = Math.random();
    if (colorRand < 0.1) star.classList.add('star-gold');
    else if (colorRand < 0.18) star.classList.add('star-purple');
    else if (colorRand < 0.26) star.classList.add('star-cyan');
    
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 8 + 's';
    star.style.animationDuration = 5 + Math.random() * 6 + 's';
    starContainer.appendChild(star);
  }
  
  for (let i = 0; i < 6; i++) {
    const shootingStar = document.createElement('div');
    shootingStar.classList.add('shooting-star');
    shootingStar.style.left = Math.random() * 100 + '%';
    shootingStar.style.top = Math.random() * 50 + '%';
    shootingStar.style.animationDelay = Math.random() * 15 + 's';
    shootingStar.style.animationDuration = 2 + Math.random() * 2 + 's';
    starContainer.appendChild(shootingStar);
  }
  
  const dustCount = 40;
  for (let i = 0; i < dustCount; i++) {
    const dust = document.createElement('div');
    dust.classList.add('cosmic-dust');
    dust.style.left = Math.random() * 100 + '%';
    dust.style.animationDelay = Math.random() * 20 + 's';
    dust.style.animationDuration = 15 + Math.random() * 12 + 's';
    dust.style.opacity = 0.4 + Math.random() * 0.4;
    dust.style.width = (6 + Math.random() * 6) + 'px';
    dust.style.height = (6 + Math.random() * 6) + 'px';
    starContainer.appendChild(dust);
  }
})();
</script>

<div class="auth-card" id="authCard">
  <div class="brand">
    <div class="brand-icon"><i class="fas fa-graduation-cap"></i></div>
    <div class="brand-name">Smart<span> Class Monitoring</span></div>
  </div>
  <h2>Create Account</h2>
  <div class="sub">Set up an account to start using the attendance system.</div>
  
  {% if error %}
  <div class="err">
    <i class="fas fa-exclamation-triangle"></i>
    <span>{{ error }}</span>
  </div>
  {% endif %}
  
  <form method="post">
    <div class="input-group">
      <label><i class="fas fa-user"></i> Username</label>
      <input type="text" name="username" autocomplete="username" required
        placeholder="Choose a username" value="{{ username or '' }}">
    </div>
    
    <div class="input-group">
      <label><i class="fas fa-envelope"></i> Email</label>
      <input type="email" name="email" autocomplete="email" required
        placeholder="your@email.com" value="{{ email or '' }}">
    </div>
    
    <div class="input-group">
      <label><i class="fas fa-lock"></i> Password</label>
      <div class="password-wrapper">
        <input type="password" name="password" id="password" autocomplete="new-password" required
          placeholder="Create a strong password">
        <button type="button" class="toggle-password" id="togglePasswordBtn" aria-label="Show/Hide Password">
          <i class="fas fa-eye-slash" id="passwordToggleIcon"></i>
        </button>
      </div>
    </div>
    
    <div class="hint">
      <i class="fas fa-shield-alt"></i> At least 6 characters - alphanumeric recommended
    </div>
    
    <div class="input-group">
      <label><i class="fas fa-check-double"></i> Confirm Password</label>
      <div class="password-wrapper">
        <input type="password" name="confirm" id="confirmPassword" autocomplete="new-password" required
          placeholder="Re-enter your password">
        <button type="button" class="toggle-password" id="toggleConfirmBtn" aria-label="Show/Hide Password">
          <i class="fas fa-eye-slash" id="confirmToggleIcon"></i>
        </button>
      </div>
    </div>
    
    <button class="btn" type="submit">
      <i class="fas fa-user-plus" style="margin-right: 8px;"></i> Create Account
    </button>
  </form>
  
  <div class="alt">
    <i class="fas fa-arrow-left" style="font-size: 0.7rem; opacity: 0.7;"></i>
    Already have an account? <a href="/login">Sign in</a>
  </div>
</div>

<script>
// Password visibility toggle for both password fields
(function() {
  // Toggle for main password field
  const toggleBtn = document.getElementById('togglePasswordBtn');
  const passwordField = document.getElementById('password');
  const icon = document.getElementById('passwordToggleIcon');
  
  if (toggleBtn && passwordField && icon) {
    toggleBtn.addEventListener('click', function(e) {
      e.preventDefault();
      const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordField.setAttribute('type', type);
      if (type === 'text') {
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      } else {
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      }
    });
  }
  
  // Toggle for confirm password field
  const toggleConfirm = document.getElementById('toggleConfirmBtn');
  const confirmField = document.getElementById('confirmPassword');
  const confirmIcon = document.getElementById('confirmToggleIcon');
  
  if (toggleConfirm && confirmField && confirmIcon) {
    toggleConfirm.addEventListener('click', function(e) {
      e.preventDefault();
      const type = confirmField.getAttribute('type') === 'password' ? 'text' : 'password';
      confirmField.setAttribute('type', type);
      if (type === 'text') {
        confirmIcon.classList.remove('fa-eye-slash');
        confirmIcon.classList.add('fa-eye');
      } else {
        confirmIcon.classList.remove('fa-eye');
        confirmIcon.classList.add('fa-eye-slash');
      }
    });
  }
})();

// Ripple effect on card click
const authCard = document.getElementById('authCard');
if (authCard) {
  authCard.addEventListener('click', function(e) {
    if (e.target.closest('button') || e.target.closest('a') || e.target.closest('input')) return;
    const ripple = document.createElement('span');
    ripple.classList.add('ripple');
    const rect = authCard.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    authCard.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  });
}

// Button ripple effect
const btn = document.querySelector('.btn');
if (btn) {
  btn.addEventListener('click', function(e) {
    const ripple = document.createElement('span');
    ripple.classList.add('ripple');
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    btn.style.position = 'relative';
    btn.style.overflow = 'hidden';
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  });
}
</script>
</body>
